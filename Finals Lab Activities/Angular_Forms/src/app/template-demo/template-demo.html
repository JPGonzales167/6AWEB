<form (ngSubmit)="onSubmit()" #userForm="ngForm">
  <input
    class="input-box"
    type="text"
    name="username"
    [(ngModel)]="username"
    placeholder="Enter your username"
    required>

  <input
    class="input-box"
    type="email"
    name="email"
    [(ngModel)]="email"
    placeholder="Enter your email"
    required>

  <input
    class="input-box"
    type="password"
    name="password"
    [(ngModel)]="password"
    placeholder="Enter your password"
    required
    minlength="6">
  <select
    class="input-box"
    name="role"
    [(ngModel)]="role"
    required>
    <option value="" disabled selected>Select your role</option>
    <option value="admin">Admin</option>
    <option value="user">User</option>
    <option value="guest">Guest</option>
  </select>

  <div class="field-group">
    <label class="field-label">Gender</label>
    <div class="radio-group">
      <label class="radio-label">
        <input
          type="radio"
          name="gender"
          value="male"
          [(ngModel)]="gender"
          required>
        <span>Male</span>
      </label>
      <label class="radio-label">
        <input
          type="radio"
          name="gender"
          value="female"
          [(ngModel)]="gender"
          required>
        <span>Female</span>
      </label>
      <label class="radio-label">
        <input
          type="radio"
          name="gender"
          value="other"
          [(ngModel)]="gender"
          required>
        <span>Other</span>
      </label>
    </div>
  </div>

  <div class="field-group">
    <label class="field-label">Status</label>
    <div class="radio-group">
      <label class="radio-label">
        <input
          type="radio"
          name="status"
          value="permanent"
          [(ngModel)]="status"
          required>
        <span>Permanent</span>
      </label>
      <label class="radio-label">
        <input
          type="radio"
          name="status"
          value="probationary"
          [(ngModel)]="status"
          required>
        <span>Probationary</span>
      </label>
    </div>
  </div>

  <textarea
    class="input-box textarea"
    name="comments"
    [(ngModel)]="comments"
    placeholder="Enter your comments or notes"
    rows="4"
    required></textarea>

  <input
    class="btn"
    type="submit"
    value="Submit"
    [disabled]="!userForm.valid">

</form>
